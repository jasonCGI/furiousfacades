<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="theme-color" content="#101010">
    <title>Sign in | Josh Social Publisher</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #101010; color: #f3efe8; }
      * { box-sizing: border-box; }
      body { min-width: 20rem; min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 1rem; background: radial-gradient(circle at 80% 12%, rgba(240, 90, 40, 0.14), transparent 24rem), #101010; }
      main { width: min(100%, 27rem); border: 1px solid #393733; background: rgba(24, 24, 23, 0.96); padding: clamp(1.5rem, 6vw, 2.5rem); }
      .brand { margin: 0 0 2.5rem; font-size: 0.76rem; font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase; }
      .brand span { color: #f05a28; }
      h1 { margin: 0 0 0.65rem; font-size: clamp(1.8rem, 7vw, 2.6rem); line-height: 0.98; letter-spacing: -0.05em; }
      p { margin: 0 0 1.5rem; color: #aaa49b; line-height: 1.55; }
      label { display: block; margin-bottom: 0.5rem; font-size: 0.82rem; font-weight: 800; }
      input { width: 100%; min-height: 3rem; padding: 0.75rem; border: 1px solid #55514b; border-radius: 0; background: #111110; color: #f3efe8; }
      button { width: 100%; min-height: 3rem; margin-top: 1rem; border: 1px solid #f05a28; border-radius: 0; background: #f05a28; color: #1d0d06; cursor: pointer; font: inherit; font-size: 0.78rem; font-weight: 900; letter-spacing: 0.09em; text-transform: uppercase; }
      button:hover { background: #ff7140; }
      :focus-visible { outline: 3px solid #f7c45b; outline-offset: 3px; }
      .error { display: none; margin: 0 0 1rem; padding: 0.75rem; border: 1px solid #8f2118; background: rgba(143, 33, 24, 0.22); color: #ffd6d1; font-size: 0.84rem; line-height: 1.4; }
      .error[data-visible="true"] { display: block; }
      .note { margin: 1.5rem 0 0; font-size: 0.74rem; }
    </style>
  </head>
  <body>
    <main>
      <p class="brand">Josh <span>Social Publisher</span></p>
      <h1>Private prototype</h1>
      <p>Enter the workspace password to review the social-posting mockup.</p>
      <p class="error" id="error" role="alert">That password did not match. Try again or ask Jason for the current password.</p>
      <form action="/studio/social-publisher/session" method="post">
        <label for="password">Workspace password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required autofocus>
        <button type="submit">Open mockup</button>
      </form>
      <p class="note">This is a design prototype. It cannot access social accounts or publish content.</p>
    </main>
    <script>
      if (new URLSearchParams(window.location.search).has("error")) {
        document.querySelector("#error").dataset.visible = "true";
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Furious Facades website coming soon.">
    <title>Furious Facades | Coming Soon</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, Helvetica, sans-serif;
        background: #101010;
        color: #f5f5f5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 2rem;
        background:
          radial-gradient(circle at top left, rgba(220, 50, 47, 0.25), transparent 38rem),
          #101010;
      }

      main {
        width: min(42rem, 100%);
      }

      .eyebrow {
        margin: 0 0 1rem;
        color: #ef5a47;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 10vw, 6.5rem);
        line-height: 0.9;
        letter-spacing: -0.06em;
      }

      p:last-child {
        max-width: 32rem;
        margin: 2rem 0 0;
        color: #bdbdbd;
        font-size: clamp(1rem, 2vw, 1.25rem);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Website in progress</p>
      <h1>Furious<br>Facades</h1>
      <p>We are putting the finishing touches on the site. Check back soon.</p>
    </main>
  </body>
</html>
